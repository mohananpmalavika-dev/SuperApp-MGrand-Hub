version: '3.8'

services:
  content-generation-service:
    build: .
    container_name: content-generation-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=production
      - PORT=3008
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - MAX_FILE_SIZE=52428800
      - MAX_CONCURRENT_JOBS=3
      - TTS_VOICE=en-US-JennyNeural
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./outputs:/usr/src/app/outputs
      - ./logs:/usr/src/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mgrand-network

networks:
  mgrand-network:
    external: true
