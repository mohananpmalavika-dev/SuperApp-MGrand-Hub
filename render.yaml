      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false  # Set in dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false  # Set in dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false  # Set in dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false  # Set in dashboard
    autoDeploy: true
