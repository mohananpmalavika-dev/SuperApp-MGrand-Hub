# Render Blueprint for SuperApp MGrand Hub
# This file defines all microservices for automatic deployment

services:
  # =====================================================
  # AUTH SERVICE - Authentication & Authorization
  # =====================================================
  - type: web
    name: auth-service
    env: node
    region: oregon
    plan: standard
    rootDirectory: .
    buildCommand: npm install --prefix packages/shared && npm install --prefix services/auth-service
    startCommand: cd services/auth-service && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false  # Set manually in dashboard
      - key: REDIS_URL
        sync: false  # Set manually: redis://user:pass@host:port
      - key: JWT_SECRET
        generateValue: true  # Auto-generate secure secret
      - key: JWT_EXPIRE
        value: 7d
    autoDeploy: true

  # =====================================================
  # USER SERVICE - User Profile Management
  # =====================================================
  - type: web
    name: user-service
    env: node
    region: oregon
    plan: standard
    buildCommand: npm install --prefix packages/shared && npm install --prefix services/user-service
    startCommand: cd services/user-service && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: auth-service
          envVarKey: JWT_SECRET
      - key: AUTH_SERVICE_URL
        value: https://auth-service.onrender.com
    autoDeploy: true

  # =====================================================
  # ECOMMERCE SERVICE - Products & Orders
  # =====================================================
