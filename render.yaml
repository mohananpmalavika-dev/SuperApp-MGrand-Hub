    name: ecommerce-service
    env: node
    region: oregon
    plan: standard
    buildCommand: npm install --prefix packages/shared && npm install --prefix services/ecommerce-service
    startCommand: cd services/ecommerce-service && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: auth-service
          envVarKey: JWT_SECRET
      - key: PAYMENT_SERVICE_URL
        value: https://payment-service.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://notification-service.onrender.com
      - key: USER_SERVICE_URL
        value: https://user-service.onrender.com
    autoDeploy: true

  # =====================================================
  # PAYMENT SERVICE - Payment Processing
  # =====================================================
  - type: web
    name: payment-service
    env: node
    region: oregon
    plan: standard
    buildCommand: npm install --prefix packages/shared && npm install --prefix services/payment-service
    startCommand: cd services/payment-service && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: auth-service
          envVarKey: JWT_SECRET
      - key: RAZORPAY_KEY_ID
        sync: false  # Set in dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false  # Set in dashboard
      - key: NOTIFICATION_SERVICE_URL
        value: https://notification-service.onrender.com
    autoDeploy: true

  # =====================================================
